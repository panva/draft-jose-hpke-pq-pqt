name: "Deploy PR Preview"

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    paths:
      - 'draft-*.md'

concurrency: preview-${{ github.ref }}

jobs:
  deploy-preview:
    name: "Deploy PR Preview"
    runs-on: ubuntu-latest
    # Skip for PRs from forks: GITHUB_TOKEN does not have write access.
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: "Checkout"
      if: github.event.action != 'closed'
      uses: actions/checkout@v5

    - name: "Build Drafts"
      if: github.event.action != 'closed'
      uses: martinthomson/i-d-template@v1
      with:
        token: ${{ github.token }}

    - name: "Fix workspace ownership"
      if: github.event.action != 'closed'
      run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

    - name: "Stage Preview"
      if: github.event.action != 'closed'
      run: |
        mkdir -p pr-preview-build
        cp draft-*.html draft-*.txt pr-preview-build/ 2>/dev/null || true
        ls -la pr-preview-build

    - name: "Deploy PR Preview"
      id: preview
      uses: rossjrw/pr-preview-action@v1
      with:
        source-dir: pr-preview-build
        preview-branch: gh-pages
        umbrella-dir: pr-preview
        action: auto
        comment: false

    - name: "Comment preview link"
      if: github.event.action != 'closed' && steps.preview.outputs.deployment-action == 'deploy'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: pr-preview
        message: |
          :page_facing_up: Rendered draft preview for this PR:

          - [draft-skokan-jose-hpke-pq-pqt.html](${{ steps.preview.outputs.preview-url }}draft-skokan-jose-hpke-pq-pqt.html)
          - [draft-skokan-jose-hpke-pq-pqt.txt](${{ steps.preview.outputs.preview-url }}draft-skokan-jose-hpke-pq-pqt.txt)
          - [Diff vs editor's copy](https://author-tools.ietf.org/api/iddiff?url_1=https://panva.github.io/draft-jose-hpke-pq-pqt/draft-skokan-jose-hpke-pq-pqt.txt&url_2=${{ steps.preview.outputs.preview-url }}draft-skokan-jose-hpke-pq-pqt.txt&difftype=--hwdiff)

          <sub>Updated for ${{ github.event.pull_request.head.sha }}. Preview is removed when this PR is closed.</sub>

    - name: "Comment preview removed"
      if: github.event.action == 'closed'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        header: pr-preview
        message: |
          :wastebasket: Preview removed because this PR was closed.
